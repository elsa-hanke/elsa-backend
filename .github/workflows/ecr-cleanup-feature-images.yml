name: ECR – Delete feature images

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  cleanup:
    name: Delete ECR images tagged with feature-*, main-*, or release-* (except main-latest and release-latest)
    runs-on: ubuntu-latest
    environment: shared

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1

      - name: Delete feature-*, main-*, and release-* images from ECR
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          REPO_NAME=$(echo "$ECR_REPOSITORY" | cut -d'/' -f2-)
          echo "Repository: $REPO_NAME"

          ALL_IMAGES=$(aws ecr describe-images \
            --repository-name "$REPO_NAME" \
            --filter tagStatus=TAGGED \
            --output json \
            --query 'imageDetails[*].{digest:imageDigest,tags:imageTags}')

          echo "All tagged images: $ALL_IMAGES"

          IMAGE_IDS=$(echo "$ALL_IMAGES" | jq '[
            .[] |
            select(
              (.tags | any(startswith("feature") or startswith("main-") or startswith("release-")))
              and
              (.tags | any(. == "main-latest") | not)
            ) |
            { imageDigest: .digest }
          ]')

          echo "Images to delete: $IMAGE_IDS"

          if [ "$IMAGE_IDS" = "[]" ] || [ -z "$IMAGE_IDS" ]; then
            echo "No matching images found – nothing to delete."
            exit 0
          fi

          TOTAL=$(echo "$IMAGE_IDS" | jq 'length')
          echo "Total images to delete: $TOTAL"

           OFFSET=0
           CHUNK_SIZE=100
           while [ "$OFFSET" -lt "$TOTAL" ]; do
             CHUNK=$(echo "$IMAGE_IDS" | jq --argjson o "$OFFSET" --argjson c "$CHUNK_SIZE" '.[$o:$o+$c]')
             echo "Deleting images $OFFSET – $((OFFSET + CHUNK_SIZE - 1))..."
             aws ecr batch-delete-image \
               --repository-name "$REPO_NAME" \
               --image-ids "$CHUNK"
             OFFSET=$((OFFSET + CHUNK_SIZE))
           done
