name: Backend security Scan (BOM + Grype)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  grype-scan:
    name: Generate SBOM and Grype vulnerability scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate CycloneDX BOM
        run: ./gradlew cyclonedxBom -x test -x integrationTest

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Run Grype security scan
        run: |
          grype -o table --fail-on high ./build/reports/cyclonedx-direct/bom.json

  notify-slack:
    name: Ilmoita Slackiin löydetyistä haavoittuvuuksista
    runs-on: ubuntu-latest
    needs: [grype-scan]
    if: failure()
    steps:
      - name: Lähetä Slack-ilmoitus
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":warning: *Taustapalvelun tietoturvaskannaus epäonnistui*",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": ":warning: Taustapalvelun tietoturvaskannaus — haavoittuvuuksia löydetty",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Taustapalvelun riippuvuuksissa löydettiin *korkean tai kriittisen vakavuuden haavoittuvuuksia*.\nKorjaukset suositellaan tehtäväksi välittömästi."
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Työnkulku:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Avaa ajo>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Käynnistäjä:*\n${{ github.event_name }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
