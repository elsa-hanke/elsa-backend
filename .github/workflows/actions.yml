name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'release/**'
  pull_request:

permissions:
  id-token: write
  contents: write

jobs:
  backend-test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-includes: |
            caches
            notifications
      - name: Build
        run: ./gradlew build -x test -x integrationTest
      - name: Test
        run: ./gradlew test
      - name: Integration test
        run: ./gradlew integrationTest
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: ./build/reports/cyclonedx-direct/bom.json
      - name: Store reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            **/build/test-results/integrationTest/

  frontend-test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock
      - name: Install dependencies
        working-directory: frontend
        run: yarn
      - name: Lint
        working-directory: frontend
        run: yarn lint
      - name: Test
        working-directory: frontend
        run: yarn test:unit
      - name: Generate thirdparty
        working-directory: frontend
        run: yarn generate-thirdparty
      - name: Build
        working-directory: frontend
        run: yarn build --mode production-test
      - name: Security scan
        working-directory: frontend
        run: echo "/bin/bash -c 'yarn audit --groups dependencies; [[ $? -ge 16 ]] && exit 1 || exit 0'"
      - name: Store dist
        uses: actions/upload-artifact@v4
        with:
          name: ElsaFrontendApp
          path: frontend/dist

  frontend-build-prod:
    runs-on: ubuntu-latest
    needs: frontend-test-and-build
    if: startsWith(github.ref, 'refs/tags/release/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock
      - name: Install dependencies
        working-directory: frontend
        run: yarn
      - name: Build
        working-directory: frontend
        run: yarn build
      - name: Store dist
        uses: actions/upload-artifact@v4
        with:
          name: ElsaFrontendAppProd
          path: frontend/dist

  backend-security-scan:
    runs-on: ubuntu-latest
    needs: backend-test-and-build
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: ./build/reports
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Run Grype security scan
        run: |
          grype -o table --fail-on high ./build/reports/bom.json

  backend-build-image:
    runs-on: ubuntu-latest
    needs: backend-test-and-build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/release/') || startsWith(github.ref, 'refs/heads/feature/') || startsWith(github.head_ref, 'feature/')
    outputs:
      image-tag: ${{ steps.image-tag.outputs.image-tag }}
    environment: shared

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Set image tag
        id: image-tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "image-tag=$(date +"%Y%m%d%H%M%S")" >> "$GITHUB_OUTPUT"
            echo "extra-tag=latest" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/release/* ]]; then
            echo "image-tag=$(date +"%Y%m%d%H%M%S")" >> "$GITHUB_OUTPUT"
            echo "extra-tag=" >> "$GITHUB_OUTPUT"
          else
            SHA="${{ github.event.pull_request.head.sha || github.sha }}"
            echo "image-tag=feature-$(echo "$SHA" | cut -c1-8)" >> "$GITHUB_OUTPUT"
            echo "extra-tag=feature-latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build image and push to ecr
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          EXTRA="${{ steps.image-tag.outputs.extra-tag }}"
          EXTRA_TAGS_ARG=""
          if [ -n "$EXTRA" ]; then
            EXTRA_TAGS_ARG="-Djib.to.tags=$EXTRA"
          fi
          ./gradlew jib -Pprod \
            -Djib.to.image=$ECR_REPOSITORY:${{ steps.image-tag.outputs.image-tag }} \
            $EXTRA_TAGS_ARG

  frontend-build-test-image:
    runs-on: ubuntu-latest
    needs: frontend-test-and-build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/release/') || startsWith(github.ref, 'refs/heads/feature/') || startsWith(github.head_ref, 'feature/')
    outputs:
      image-tag: ${{ steps.image-tag.outputs.image-tag }}
      extra-tag: ${{ steps.image-tag.outputs.extra-tag }}
    environment: shared

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set image tag
        id: image-tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "image-tag=$(date +"%Y%m%d%H%M%S")" >> "$GITHUB_OUTPUT"
            echo "extra-tag=latest" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/release/* ]]; then
            echo "image-tag=$(date +"%Y%m%d%H%M%S")" >> "$GITHUB_OUTPUT"
            echo "extra-tag=" >> "$GITHUB_OUTPUT"
          else
            SHA="${{ github.event.pull_request.head.sha || github.sha }}"
            echo "image-tag=feature-$(echo "$SHA" | cut -c1-8)" >> "$GITHUB_OUTPUT"
            echo "extra-tag=feature-latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push frontend image
        env:
          FRONTEND_ECR_REPOSITORY: ${{ secrets.FRONTEND_ECR_REPOSITORY }}
        run: |
          EXTRA="${{ steps.image-tag.outputs.extra-tag }}"
          docker build \
            --file frontend/docker/Dockerfile \
            -t $FRONTEND_ECR_REPOSITORY:${{ steps.image-tag.outputs.image-tag }} \
            frontend
          if [ -n "$EXTRA" ]; then
            docker tag $FRONTEND_ECR_REPOSITORY:${{ steps.image-tag.outputs.image-tag }} $FRONTEND_ECR_REPOSITORY:$EXTRA
            docker push $FRONTEND_ECR_REPOSITORY:$EXTRA
          fi
          docker push $FRONTEND_ECR_REPOSITORY:${{ steps.image-tag.outputs.image-tag }}

  e2e:
    needs: [backend-build-image, frontend-build-test-image]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/feature/') || startsWith(github.head_ref, 'feature/')
    uses: ./.github/workflows/e2e.yml
    with:
      image-tag: ${{ needs.backend-build-image.outputs.image-tag }}
      frontend-image-tag: ${{ needs.frontend-build-test-image.outputs.extra-tag != '' && needs.frontend-build-test-image.outputs.extra-tag || needs.frontend-build-test-image.outputs.image-tag }}
    secrets: inherit

  deploy-dev-backend:
    runs-on: ubuntu-latest
    needs: [backend-build-image, backend-security-scan, e2e]
    if: github.ref == 'refs/heads/main'
    environment: development

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition elsa-dev-backend --query taskDefinition | jq -r 'del(
          .taskDefinitionArn,
          .requiresAttributes,
          .compatibilities,
          .revision,
          .status,
          .registeredAt,
          .registeredBy
          )' > task-definition.json
      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: elsa-dev-backend-container
          image: ${{ secrets.ECR_REPOSITORY }}:${{ needs.backend-build-image.outputs.image-tag }}
      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: elsa-dev-backend-service
          cluster: elsa-dev-cluster
          wait-for-service-stability: true

  deploy-dev-frontend:
    runs-on: ubuntu-latest
    needs: [frontend-test-and-build, backend-security-scan, e2e]
    if: github.ref == 'refs/heads/main'
    environment: development

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: ElsaFrontendApp
          path: dist
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Deploy static site to S3 bucket
        run: aws s3 sync dist s3://kehitys.elsapalvelu.fi/ --delete
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.DISTRIBUTION_ID }} --paths "/*"

  deploy-maintenance-page-staging:
    runs-on: ubuntu-latest
    needs: [backend-build-image, frontend-build-test-image]
    if: startsWith(github.ref, 'refs/tags/release/')
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Deploy static site to S3 bucket
        run: aws s3 mv src/main/resources/templates/huoltokatko.html s3://testi.elsapalvelu.fi/index.html
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.DISTRIBUTION_ID }} --paths "/*"

  deploy-staging-backend:
    runs-on: ubuntu-latest
    needs: [backend-build-image, frontend-build-test-image]
    if: startsWith(github.ref, 'refs/tags/release/')
    environment: staging

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition elsa-staging-backend --query taskDefinition | jq -r 'del(
          .taskDefinitionArn,
          .requiresAttributes,
          .compatibilities,
          .revision,
          .status,
          .registeredAt,
          .registeredBy
          )' > task-definition.json
      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: elsa-staging-backend-container
          image: ${{ secrets.ECR_REPOSITORY }}:${{ needs.backend-build-image.outputs.image-tag }}
      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: elsa-staging-backend-service
          cluster: elsa-staging-cluster
          wait-for-service-stability: true

  deploy-staging-frontend:
    runs-on: ubuntu-latest
    needs: [frontend-build-test-image, frontend-test-and-build]
    if: startsWith(github.ref, 'refs/tags/release/')
    environment: staging

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: ElsaFrontendApp
          path: dist
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Deploy static site to S3 bucket
        run: aws s3 sync dist s3://testi.elsapalvelu.fi/ --delete
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.DISTRIBUTION_ID }} --paths "/*"

  production-gate:
    runs-on: ubuntu-latest
    needs: [deploy-staging-backend, deploy-staging-frontend]
    if: startsWith(github.ref, 'refs/tags/release/')
    environment: production

    steps:
      - name: Tuotantoon siirtyminen hyväksytty
        run: echo "Yksi hyväksyntä riittää kaikille tuotantovaiheille"

  deploy-maintenance-page-prod:
    runs-on: ubuntu-latest
    needs: [production-gate, backend-build-image]
    if: startsWith(github.ref, 'refs/tags/release/')
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Deploy static site to S3 bucket
        run: aws s3 mv src/main/resources/templates/huoltokatko.html s3://elsapalvelu.fi/index.html
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.DISTRIBUTION_ID }} --paths "/*"

  deploy-prod-backend:
    runs-on: ubuntu-latest
    needs: [deploy-maintenance-page-prod, backend-build-image]
    if: startsWith(github.ref, 'refs/tags/release/')
    environment: production

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition elsa-prod-backend --query taskDefinition | jq -r 'del(
          .taskDefinitionArn,
          .requiresAttributes,
          .compatibilities,
          .revision,
          .status,
          .registeredAt,
          .registeredBy
          )' > task-definition.json
      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: elsa-prod-backend-container
          image: ${{ secrets.ECR_REPOSITORY }}:${{ needs.backend-build-image.outputs.image-tag }}
      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: elsa-prod-backend-service
          cluster: elsa-prod-cluster
          wait-for-service-stability: true

  deploy-prod-frontend:
    runs-on: ubuntu-latest
    needs: [deploy-prod-backend, frontend-build-test-image, frontend-build-prod]
    if: startsWith(github.ref, 'refs/tags/release/')
    environment: production

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: ElsaFrontendAppProd
          path: dist
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Deploy static site to S3 bucket
        run: aws s3 sync dist s3://elsapalvelu.fi/ --delete
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.DISTRIBUTION_ID }} --paths "/*"

  merge-release:
    runs-on: ubuntu-latest
    needs: [deploy-prod-backend, deploy-prod-frontend]
    if: startsWith(github.ref, 'refs/tags/release/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MERGE_TOKEN }}
      - name: Yhdistä release master- ja main-haaroihin
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${GITHUB_REF_NAME}"
          git fetch --all
          git checkout master
          git merge origin/$BRANCH --no-ff -m "Yhdistä ${BRANCH} master-haaraan"
          git push origin master
          git checkout main
          git merge origin/$BRANCH --no-ff -m "Yhdistä ${BRANCH} main-haaraan"
          git push origin main

