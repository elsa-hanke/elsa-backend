name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  id-token: write
  contents: write

jobs:
  backend-test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-includes: |
            caches
            notifications
      - name: Build
        run: ./gradlew build -x test -x integrationTest
      - name: Test
        run: ./gradlew test
      - name: Integration test
        run: ./gradlew integrationTest
      - name: Generate SBOM
        run: ./gradlew cyclonedxBom -x test -x integrationTest
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: ./build/reports/cyclonedx-direct/bom.json
      - name: Store reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            **/build/test-results/integrationTest/

  frontend-test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock
      - name: Install dependencies
        working-directory: frontend
        run: yarn
      - name: Set version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            SHA="${{ github.sha }}"
            echo "VUE_APP_VERSION=$(echo "$SHA" | cut -c1-6)" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VUE_APP_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            SHA="${{ github.event.pull_request.head.sha || github.sha }}"
            echo "VUE_APP_VERSION=$(echo "$SHA" | cut -c1-6)" >> $GITHUB_ENV
          fi
      - name: Lint
        working-directory: frontend
        run: yarn lint
      - name: Test
        working-directory: frontend
        run: yarn test:unit
      - name: Generate thirdparty
        working-directory: frontend
        run: yarn generate-thirdparty
      - name: Build
        working-directory: frontend
        run: yarn build --mode production-test
      - name: Security scan
        working-directory: frontend
        run: /bin/bash -c 'yarn audit --groups dependencies; [[ $? -ge 16 ]] && exit 1 || exit 0'
      - name: Store dist
        uses: actions/upload-artifact@v4
        with:
          name: ElsaFrontendApp
          path: frontend/dist

  frontend-build-prod:
    runs-on: ubuntu-latest
    needs: frontend-test-and-build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock
      - name: Install dependencies
        working-directory: frontend
        run: yarn
      - name: Set version
        run: echo "VUE_APP_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
      - name: Build
        working-directory: frontend
        run: yarn build
      - name: Store dist
        uses: actions/upload-artifact@v4
        with:
          name: ElsaFrontendAppProd
          path: frontend/dist

  backend-security-scan:
    runs-on: ubuntu-latest
    needs: backend-test-and-build
    if: "!startsWith(github.ref, 'refs/tags/v')"
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: ./build/reports
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Run Grype security scan
        run: |
          grype -o table --fail-on high ./build/reports/bom.json

  backend-build-image:
    runs-on: ubuntu-latest
    needs: backend-test-and-build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/heads/feature/') || startsWith(github.head_ref, 'feature/')
    outputs:
      image-tag: ${{ steps.image-tag.outputs.image-tag }}
    environment: Shared

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Set image tag
        id: image-tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            SHA="${{ github.sha }}"
            echo "image-tag=main-$(echo "$SHA" | cut -c1-8)" >> "$GITHUB_OUTPUT"
            echo "extra-tag=main-latest" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "image-tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "extra-tag=" >> "$GITHUB_OUTPUT"
          else
            SHA="${{ github.event.pull_request.head.sha || github.sha }}"
            echo "image-tag=feature-$(echo "$SHA" | cut -c1-8)" >> "$GITHUB_OUTPUT"
            echo "extra-tag=feature-latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build image and push to ecr
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          EXTRA="${{ steps.image-tag.outputs.extra-tag }}"
          EXTRA_TAGS_ARG=""
          if [ -n "$EXTRA" ]; then
            EXTRA_TAGS_ARG="-Djib.to.tags=$EXTRA"
          fi
          ./gradlew jib -Pprod \
            -Djib.to.image=$ECR_REPOSITORY:${{ steps.image-tag.outputs.image-tag }} \
            $EXTRA_TAGS_ARG

  frontend-build-test-image:
    runs-on: ubuntu-latest
    needs: frontend-test-and-build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/feature/') || startsWith(github.head_ref, 'feature/')
    outputs:
      image-tag: ${{ steps.image-tag.outputs.image-tag }}
      extra-tag: ${{ steps.image-tag.outputs.extra-tag }}
    environment: Shared

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set image tag
        id: image-tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            SHA="${{ github.sha }}"
            echo "image-tag=main-$(echo "$SHA" | cut -c1-8)" >> "$GITHUB_OUTPUT"
            echo "extra-tag=main-latest" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "image-tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "extra-tag=" >> "$GITHUB_OUTPUT"
          else
            SHA="${{ github.event.pull_request.head.sha || github.sha }}"
            echo "image-tag=feature-$(echo "$SHA" | cut -c1-8)" >> "$GITHUB_OUTPUT"
            echo "extra-tag=feature-latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: "939452229770"
      - name: Build and push frontend image
        env:
          FRONTEND_ECR_REPOSITORY: ${{ secrets.FRONTEND_ECR_REPOSITORY }}
        run: |
          EXTRA="${{ steps.image-tag.outputs.extra-tag }}"
          docker build \
            --file frontend/docker/Dockerfile \
            -t $FRONTEND_ECR_REPOSITORY:${{ steps.image-tag.outputs.image-tag }} \
            frontend
          if [ -n "$EXTRA" ]; then
            docker tag $FRONTEND_ECR_REPOSITORY:${{ steps.image-tag.outputs.image-tag }} $FRONTEND_ECR_REPOSITORY:$EXTRA
            docker push $FRONTEND_ECR_REPOSITORY:$EXTRA
          fi
          docker push $FRONTEND_ECR_REPOSITORY:${{ steps.image-tag.outputs.image-tag }}

  e2e:
    needs: [backend-build-image, frontend-build-test-image]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/feature/') || startsWith(github.head_ref, 'feature/')
    uses: ./.github/workflows/e2e.yml
    with:
      image-tag: ${{ needs.backend-build-image.outputs.image-tag }}
      frontend-image-tag: ${{ needs.frontend-build-test-image.outputs.extra-tag != '' && needs.frontend-build-test-image.outputs.extra-tag || needs.frontend-build-test-image.outputs.image-tag }}
    secrets: inherit

  deploy-dev-backend:
    runs-on: ubuntu-latest
    needs: [backend-build-image, backend-security-scan, e2e]
    if: github.ref == 'refs/heads/main'
    environment: Development

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition elsa-dev-backend --query taskDefinition | jq -r 'del(
          .taskDefinitionArn,
          .requiresAttributes,
          .compatibilities,
          .revision,
          .status,
          .registeredAt,
          .registeredBy
          )' > task-definition.json
      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: elsa-dev-backend-container
          image: ${{ secrets.ECR_REPOSITORY }}:${{ needs.backend-build-image.outputs.image-tag }}
      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: elsa-dev-backend-service
          cluster: elsa-dev-cluster
          wait-for-service-stability: true

  deploy-dev-frontend:
    runs-on: ubuntu-latest
    needs: [frontend-test-and-build, backend-security-scan, e2e]
    if: github.ref == 'refs/heads/main'
    environment: Development

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: ElsaFrontendApp
          path: dist
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Deploy static site to S3 bucket
        run: aws s3 sync dist s3://kehitys.elsapalvelu.fi/ --delete
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.DISTRIBUTION_ID }} --paths "/*"

  deploy-maintenance-page-staging:
    runs-on: ubuntu-latest
    needs: [backend-build-image]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: Staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Deploy static site to S3 bucket
        run: aws s3 mv src/main/resources/templates/huoltokatko.html s3://testi.elsapalvelu.fi/index.html
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.DISTRIBUTION_ID }} --paths "/*"

  deploy-staging-backend:
    runs-on: ubuntu-latest
    needs: [deploy-maintenance-page-staging, backend-build-image]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: Staging

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition elsa-staging-backend --query taskDefinition | jq -r 'del(
          .taskDefinitionArn,
          .requiresAttributes,
          .compatibilities,
          .revision,
          .status,
          .registeredAt,
          .registeredBy
          )' > task-definition.json
      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: elsa-staging-backend-container
          image: ${{ secrets.ECR_REPOSITORY }}:${{ needs.backend-build-image.outputs.image-tag }}
      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: elsa-staging-backend-service
          cluster: elsa-staging-cluster
          wait-for-service-stability: true

  deploy-staging-frontend:
    runs-on: ubuntu-latest
    needs: [deploy-staging-backend, frontend-test-and-build]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: Staging

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: ElsaFrontendApp
          path: dist
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Deploy static site to S3 bucket
        run: aws s3 sync dist s3://testi.elsapalvelu.fi/ --delete
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.DISTRIBUTION_ID }} --paths "/*"

  generate-changelog:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    outputs:
      release-branch: ${{ steps.resolve-branch.outputs.release-branch }}

    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MERGE_TOKEN || github.token }}
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Asenna auto-changelog
        run: npm install -g auto-changelog
      - name: Luo CHANGELOG.md ja committaa release-haaraan
        id: resolve-branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --all --tags
          RELEASE_BRANCH=$(git branch -r --contains "refs/tags/$GITHUB_REF_NAME" | grep -E 'origin/(release|hotfix)/' | head -1 | sed 's|.*origin/||' | xargs)
          echo "Generating changelog on branch: ${RELEASE_BRANCH}"
          echo "release-branch=${RELEASE_BRANCH}" >> "$GITHUB_OUTPUT"
          git checkout $RELEASE_BRANCH
          auto-changelog -u --hide-empty-releases --template https://raw.githubusercontent.com/Eura2021/eura2021-kong-charts/master/chlog.hbs
          git add CHANGELOG.md
          git commit -m 'CHANGELOG updated [CI SKIP]' --allow-empty CHANGELOG.md
          git push origin $RELEASE_BRANCH

  notify-staging:
    runs-on: ubuntu-latest
    needs: [deploy-staging-backend, deploy-staging-frontend, generate-changelog]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Lähetä Slack-ilmoitus testiympäristön julkaisusta
        env:
          SLACK_HOOK: ${{ secrets.NETUM_SLACK_HOOK_URL }}
        run: |
          VERSION="$GITHUB_REF_NAME"
          RELEASE_BRANCH="${{ needs.generate-changelog.outputs.release-branch }}"
          CHANGELOG_URL="https://github.com/${{ github.repository }}/blob/${RELEASE_BRANCH}/CHANGELOG.md"
#          curl -X POST -H 'Content-type: application/json' \
#            --data "{\"text\":\" Versio ${VERSION} on julkaistu testiympäristöön. Sovellus löytyy täältä: https://testi.elsapalvelu.fi/kirjautuminen\nMuutosloki: ${CHANGELOG_URL}\"}" \
#            "$SLACK_HOOK"
      - name: Lähetä Teams-ilmoitus testiympäristön julkaisusta
        env:
          TEAMS_HOOK: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          VERSION="$GITHUB_REF_NAME"
          RELEASE_BRANCH="${{ needs.generate-changelog.outputs.release-branch }}"
          CHANGELOG_URL="https://github.com/${{ github.repository }}/blob/${RELEASE_BRANCH}/CHANGELOG.md"
          PAYLOAD=$(printf '{"type":"message","attachments":[{"contentType":"application/vnd.microsoft.card.adaptive","content":{"type":"AdaptiveCard","version":"1.2","body":[{"type":"TextBlock","text":"🚀 Tämä on testi %s on julkaistu testiympäristöön.","wrap":true},{"type":"TextBlock","text":"Muutosloki:","wrap":true}],"actions":[{"type":"Action.OpenUrl","title":"Sovellus","url":"https://testi.elsapalvelu.fi/kirjautuminen"},{"type":"Action.OpenUrl","title":"Muutosloki","url":"%s"}]}}]}' "$VERSION" "$CHANGELOG_URL")
          curl --globoff -X POST -H 'Content-type: application/json' --data-raw "$PAYLOAD" "$TEAMS_HOOK"

  production-gate:
    runs-on: ubuntu-latest
    needs: [deploy-staging-backend, deploy-staging-frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: Production

    steps:
      - name: Tuotantoon siirtyminen hyväksytty
        run: echo "Yksi hyväksyntä riittää kaikille tuotantovaiheille"

  deploy-maintenance-page-prod:
    runs-on: ubuntu-latest
    needs: [production-gate, backend-build-image]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: Production-deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Deploy static site to S3 bucket
        run: aws s3 mv src/main/resources/templates/huoltokatko.html s3://elsapalvelu.fi/index.html
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.DISTRIBUTION_ID }} --paths "/*"

  deploy-prod-backend:
    runs-on: ubuntu-latest
    needs: [deploy-maintenance-page-prod, backend-build-image]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: Production-deploy

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition elsa-prod-backend --query taskDefinition | jq -r 'del(
          .taskDefinitionArn,
          .requiresAttributes,
          .compatibilities,
          .revision,
          .status,
          .registeredAt,
          .registeredBy
          )' > task-definition.json
      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: elsa-prod-backend-container
          image: ${{ secrets.ECR_REPOSITORY }}:${{ needs.backend-build-image.outputs.image-tag }}
      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: elsa-prod-backend-service
          cluster: elsa-prod-cluster
          wait-for-service-stability: true

  deploy-prod-frontend:
    runs-on: ubuntu-latest
    needs: [deploy-prod-backend, frontend-build-prod]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: Production-deploy

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: ElsaFrontendAppProd
          path: dist
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1
      - name: Deploy static site to S3 bucket
        run: aws s3 sync dist s3://elsapalvelu.fi/ --delete
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.DISTRIBUTION_ID }} --paths "/*"

  notify-prod:
    runs-on: ubuntu-latest
    needs: [deploy-prod-backend, deploy-prod-frontend]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Lähetä Slack-ilmoitus tuotantoon julkaisusta
        env:
          SLACK_HOOK: ${{ secrets.NETUM_SLACK_HOOK_URL }}
        run: |
          VERSION="$GITHUB_REF_NAME"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":rocket: Versio ${VERSION} on julkaistu tuotantoon.\"}" \
            "$SLACK_HOOK"
      - name: Lähetä Teams-ilmoitus tuotantoon julkaisusta
        env:
          TEAMS_HOOK: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          VERSION="$GITHUB_REF_NAME"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"type\":\"message\",\"attachments\":[{\"contentType\":\"application/vnd.microsoft.card.adaptive\",\"content\":{\"type\":\"AdaptiveCard\",\"version\":\"1.2\",\"body\":[{\"type\":\"TextBlock\",\"text\":\"🚀 Versio ${VERSION} on julkaistu tuotantoon.\",\"wrap\":true}]}}]}" \
            "$TEAMS_HOOK"

  merge-release:
    runs-on: ubuntu-latest
    needs: [deploy-prod-backend, deploy-prod-frontend, generate-changelog]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MERGE_TOKEN || github.token }}
      - name: Merge release master- ja main-haaroihin
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --all --tags
          RELEASE_BRANCH=$(git branch -r --contains "refs/tags/$GITHUB_REF_NAME" | grep -E 'origin/(release|hotfix)/' | head -1 | sed 's|.*origin/||' | xargs)
          git checkout master
          git merge origin/$RELEASE_BRANCH --no-ff -m "Merge $RELEASE_BRANCH ($GITHUB_REF_NAME) master-haaraan"
          git push origin master
          git checkout main
          git merge origin/$RELEASE_BRANCH --no-ff -m "Merge $RELEASE_BRANCH ($GITHUB_REF_NAME) main-haaraan"
          git push origin main
