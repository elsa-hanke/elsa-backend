name: Security Scan (BOM + Grype)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  grype-scan:
    name: Generate SBOM and Grype vulnerability scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate CycloneDX BOM
        run: ./gradlew cyclonedxBom -x test -x integrationTest

      - name: Scan BOM with Grype
        id: grype
        uses: anchore/scan-action@v3
        with:
          sbom: build/reports/cyclonedx-direct/bom.json
          fail-build: true
          severity-cutoff: high
          output-format: sarif

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}

