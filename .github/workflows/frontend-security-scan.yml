name: Frontend Security Scan

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  yarn-audit:
    name: Yarn-riippuvuuksien haavoittuvuusskannaus
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: frontend
        run: yarn --frozen-lockfile

      - name: Run yarn audit
        working-directory: frontend
        run: /bin/bash -c 'yarn audit --groups dependencies; [[ $? -ge 16 ]] && exit 1 || exit 0'

  notify-slack:
    name: Ilmoita Slackiin löydetyistä haavoittuvuuksista
    runs-on: ubuntu-latest
    needs: [yarn-audit]
    if: failure()
    steps:
      - name: Lähetä Slack-ilmoitus
        env:
          SLACK_HOOK: ${{ secrets.NETUM_SLACK_HOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":warning: *Käyttöliittymän tietoturvaskannaus — haavoittuvuuksia löydetty*\nKäyttöliittymän tuotantoriippuvuuksissa löydettiin *kriittisen vakavuuden haavoittuvuuksia*.\nKorjaukset suositellaan tehtäväksi välittömästi.\nAjo: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$SLACK_HOOK"
