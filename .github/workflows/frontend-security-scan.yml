name: Frontend Security Scan

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  yarn-audit:
    name: Yarn-riippuvuuksien haavoittuvuusskannaus
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: frontend
        run: yarn --frozen-lockfile

      - name: Run yarn audit
        working-directory: frontend
        run: /bin/bash -c 'yarn audit --groups dependencies; [[ $? -ge 16 ]] && exit 1 || exit 0'

  notify-slack:
    name: Ilmoita Slackiin löydetyistä haavoittuvuuksista
    runs-on: ubuntu-latest
    needs: [yarn-audit]
    if: failure()
    steps:
      - name: Lähetä Slack-ilmoitus
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":warning: *Käyttöliittymän tietoturvaskannaus epäonnistui*",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": ":warning: Käyttöliittymän tietoturvaskannaus — haavoittuvuuksia löydetty",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Käyttöliittymän tuotantoriippuvuuksissa löydettiin *kriittisen vakavuuden haavoittuvuuksia*.\nKorjaukset suositellaan tehtäväksi välittömästi."
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Työnkulku:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Avaa ajo>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Käynnistäjä:*\n${{ github.event_name }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
