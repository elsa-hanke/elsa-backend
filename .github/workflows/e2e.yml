name: E2E Tests

on:
  workflow_call:
    inputs:
      image-tag:
        description: Backend image tag to test against
        required: true
        type: string
  workflow_dispatch:
    inputs:
      image-tag:
        description: Backend image tag to test against
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    environment: shared
    env:
      CYPRESS_RUN_LOG: e2e/cypress/run.log

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/GithubActionsRole
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: "939452229770,654795471143"

      - name: Write secret files
        run: |
          printf '%s' "${{ secrets.SAML_PRIVATE_KEY }}" > /tmp/private.key
          printf '%s' "${{ secrets.SAML_PUBLIC_CRT }}"  > /tmp/public.crt
          printf '%s' "${{ secrets.HY_SISU_KEY }}"      > /tmp/hy-sisu.key
          printf '%s' "${{ secrets.HY_SISU_CRT }}"      > /tmp/hy-sisu.crt

      - name: Start services
        env:
          BACKEND_IMAGE_TAG: ${{ inputs.image-tag }}
          APPLICATION_SECURITY_ENCODED_KEY: ${{ secrets.APPLICATION_SECURITY_ENCODED_KEY }}
          PRIVATE_KEY_FILE: /tmp/private.key
          PUBLIC_CRT_FILE: /tmp/public.crt
          HY_SISU_KEY_FILE: /tmp/hy-sisu.key
          HY_SISU_CRT_FILE: /tmp/hy-sisu.crt
          SERVER_SERVLET_SESSION_COOKIE_SECURE: "true"
        run: |
          echo "▶ Backend image tag: $BACKEND_IMAGE_TAG"
          docker compose -p elsa-e2e -f infra/docker-compose-cicd.yml up -d --wait --wait-timeout 300

      - name: Debug SAML cookie headers
        run: |
          echo "▶ Set-Cookie headers from /saml2/authenticate/suomifi"
          curl -s -D - -o /dev/null http://localhost:8080/saml2/authenticate/suomifi | grep -i '^set-cookie' || true

      - name: Run Cypress e2e tests
        run: |
          set -o pipefail
          mkdir -p "$(dirname "$CYPRESS_RUN_LOG")"
          docker run --rm \
            --network=host \
            -v ${{ github.workspace }}/e2e:/e2e \
            -w /e2e \
            cypress/included:15.13.0 --browser chrome 2>&1 | tee "$CYPRESS_RUN_LOG"

      - name: Print Cypress log on failure
        if: failure()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Cypress run log (tail): $CYPRESS_RUN_LOG"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          tail -n 300 "$CYPRESS_RUN_LOG" || true

      - name: Print container logs
        if: always()
        run: |
          for service in db elsa-backend elsa-frontend; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Logs: $service"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            docker compose -p elsa-e2e -f infra/docker-compose-cicd.yml logs --no-color --timestamps $service || true
          done


      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: e2e/cypress/screenshots

      - name: Upload Cypress run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-run-log
          path: e2e/cypress/run.log
          if-no-files-found: warn

      - name: Upload videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: e2e/cypress/videos

      - name: Stop services
        if: always()
        run: docker compose -p elsa-e2e -f infra/docker-compose-cicd.yml down -v
